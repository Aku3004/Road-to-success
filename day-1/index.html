<body>
   <header>
     <h2>COVID-19 BUSINESS Assistance survey</h2>
     <hr><hr>
     <h3>CONTACT INFORMATION</h3>
     </header>
     <hr>
      
     <main>
     <form action="">
      <article>
        <h4>Personal Details</h4>
        <label for="fname">First Name</label>
        <input type="text" id="fname">
        <label for="bname">Last Name</label>
        <input type="text" id="bname">
        <label for="date">Date of Birth</label>
        <input type="date" id="date">
      </article>
      <br>
      <article>
        <h4>Business Name</h4>
        <input type="text">
      </article>

      <article>
        <h4>Business Address</h4>
        <br>
        <input type="text" id="sadd"><br>
        <label for="sadd">Street Address</label><br>
        <input type="text" id="sadd2"><br>
        <label for="sadd2">Street Address line2</label><br>
        <input type="text" id="city"><br>
        <label for="city">city</label><br>
        <input type="text" id="city"><br>
        <label for="city">State/Province</label><br>
         <input type="text" id="zip"><br>
        <label for="zip">postal/zip</label><br>
      </article>
         <br>
      <article>
        <label for="email">Email</label><br>
        <input type="email" id="email" placeholder="email@exxample.com">
      </article>

      <br><br>

      <article>
         <h4>Phone Number</h4>
         <input type="text">
         <input type="text"><br>
         <span>Area Code</span> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;<span>  Phone Number</span>
      </article>
      <hr>
      <article>
        <p>would you like to recieve additional information on financial assistance related to covid 19? </p>
        <input type="radio" id="yes">
        <label for="yes">yes</label><br>
        <input type="radio" id="no">
        <label for="no">no</label>
      </article>
  <br>
      <article>
        <label for="ta">Please describe your loss due to COVID-19</label><br>
        <textarea name="text area" id="ta" rows="7" cols="60" ></textarea>
      </article>

      <article>
        <label for="revenue">Please estimate any revenue decline you have experienced as a result of COVID-19.</label><br>
        <select name="revenue" id="revenue" style="width: 400px;"> 
          <option value=""></option>
          <option value="">0-10</option>
          <option value="">10-50</option>
          <option value="">50-70</option>
          <option value="">70-80</option>
        </select>
      </article>
      <br>
      <input type="submit" style="width:100px;">
    </form>

   </main>
</body>
